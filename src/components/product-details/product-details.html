<div class="container my-5">

  @if(product){

    <div class="row g-4 align-items-center  my-5  border border-1 border-primary rounded-5 py-3">

      <div class="col-md-5 text-center">
        <img [src]="product.thumbnail"
             class="img-fluid rounded shadow-sm border"
             alt="product image"
             style="max-height: 400px; object-fit: contain;">
      </div>

      <div class="col-md-7">

        <h2 class="text-primary fw-bold">{{product.title}}</h2>

        <span class="badge bg-secondary mb-2">
          {{product.category}}
        </span>

        <h3 class="text-success my-2">
          {{product.price | currency}}
        </h3>

        <div class="mb-2">
          <span class="badge bg-warning text-dark fs-6">
            {{product.rating}} ⭐
          </span>
        </div>

        @if(product.stock === 0){
          <p class="text-danger fw-bold">Out of Stock</p>
        }
        @else if(product.stock === 1){
          <p class="text-warning fw-bold">Last item!</p>
        }
        @else{
          <p class="text-muted">Stock: {{product.stock}}</p>
        }

        <hr>

        <p class="lead text-muted">
          {{product.description}}
        </p>

        <div class="d-flex gap-3 mt-4">
         

          <button class="btn btn-outline-secondary w-50"
                  routerLink="/master">
            Back
          </button>
        </div>

      </div>

    </div>

  }

</div>
